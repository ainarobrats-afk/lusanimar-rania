kind = "web"
previewPath = "/"
title = "Rania Travel"
version = "1.0.0"
id = "artifacts/rania-chat"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25049

[services.development]
run = "pnpm --filter @workspace/rania-chat run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rania-chat", "run", "build" ]
publicDir = "artifacts/rania-chat/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25049"
BASE_PATH = "/"
