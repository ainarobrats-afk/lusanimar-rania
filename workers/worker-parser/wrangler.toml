name = "rania-parser"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# AI Providers (stored as secrets, not vars)
# Set via: wrangler secret put GROQ_API_KEY_1 --name rania-parser

[vars]
WORKER_HUNTER_URL = "https://rania-hunter.lusanimar.workers.dev"
WORKER_VALIDATOR_URL = "https://rania-validator.lusanimar.workers.dev"
WORKER_CASHIER_URL = "https://rania-cashier.lusanimar.workers.dev"
# Supabase (secrets — set via: wrangler secret put SUPABASE_URL --name rania-parser)
# SUPABASE_URL and SUPABASE_SERVICE_KEY are stored as Cloudflare Secrets

# Xendit (secrets — set via: wrangler secret put XENDIT_API_KEY --name rania-parser)
# XENDIT_API_KEY and XENDIT_CALLBACK_TOKEN are stored as Cloudflare Secrets

# Cron: daily auto-renewal + low-budget nagging (6am UTC daily)
# Also set: wrangler secret put CRON_SECRET --name rania-parser
[triggers]
crons = ["0 6 * * *"]

# Service Bindings — direct worker-to-worker calls (no HTTP, no 1042 error)
[[services]]
binding = "HUNTER"
service = "rania-hunter"

[[services]]
binding = "VALIDATOR"
service = "rania-validator"

[[services]]
binding = "CASHIER"
service = "rania-cashier"
